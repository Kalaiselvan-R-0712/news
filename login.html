<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT VARIABLES ================= */
:root{
    --primary:#ff0055;
    --dark:#000000;
    --light:#ffffff;
    --gray:#777777;
}

body.dark{
    --light:#111111;
    --dark:#ffffff;
    --gray:#aaaaaa;
}

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    transition:0.3s ease;
}

body{
    min-height:100dvh;
    padding:60px 20px;
    overflow-x:hidden;
    overflow-y:auto;

    background: linear-gradient(
        135deg,
        #f5f5f5 0%,
        #ffffff 50%,
        #f2f2f2 100%
    );
}

body.dark{
    background: linear-gradient(
        135deg,
        #0f0f0f 0%,
        #141414 50%,
        #0c0c0c 100%
    );
}

/* ================= PRELOADER ================= */
#preloader{
    position:fixed;
    inset:0;
    height:100dvh;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.loader-logo{
    width:110px;
    animation:logoAnim 1.5s ease-in-out infinite alternate;
}

@keyframes logoAnim{
    from{transform:scale(1);opacity:0.6;}
    to{transform:scale(1.1);opacity:1;}
}

/* ================= THEME TOGGLE ================= */
.theme-toggle{
    position:fixed;
    top:20px;
    right:25px;
    background:#ff0055;
    color:#fff;
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:2000;
    font-size:18px;
}

/* ================= AUTH CARD ================= */
.auth-card{
    background:var(--light);
    padding:45px;
    width:100%;
    max-width:420px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,0.1);
    margin:0 auto;
}

body.dark .auth-card{
    background:#111111;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
}

/* ================= LOGO ================= */
.auth-logo{
    text-align:center;
    margin-bottom:20px;
}

.auth-logo img{
    height:50px;
    filter: brightness(0);
}

body.dark .auth-logo img{
    filter: brightness(1);
}

/* ================= HEADING ================= */
.auth-card h2{
    text-align:center;
    margin-bottom:30px;
    color:var(--dark);
}

/* ================= INPUTS ================= */
.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:var(--dark);
}

.input-group input{
    width:100%;
    padding:12px 15px;
    border-radius:10px;
    border:1px solid #ddd;
    background:#fff;
    color:#000;
    outline:none;
    height:45px;
}

body.dark .input-group input{
    background:#1a1a1a;
    border:1px solid #333;
    color:#ffffff;
}

.input-group input:focus{
    border-color:var(--primary);
}

/* Password eye */
.password-wrapper{
    position:relative;
}

.password-wrapper input{
    padding-right:45px;
}

.password-wrapper span{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:16px;
}

/* Forgot */
.forgot-pass-wrapper{
    text-align:right;
    margin-top:-15px;
    margin-bottom:20px;
}

.forgot-pass-link{
    font-size:12px;
    color:var(--gray);
    text-decoration:none;
}

.forgot-pass-link:hover{
    color:var(--primary);
}

/* ================= BUTTON ================= */
.btn-primary{
    width:100%;
    padding:13px;
    border:none;
    border-radius:30px;
    background:var(--primary);
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

.btn-primary:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,0,85,0.3);
}

/* ================= LINKS ================= */
.auth-link{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:var(--dark);
}

.auth-link a{
    color:var(--primary);
    font-weight:600;
    text-decoration:none;
}

/* ================= ERROR ================= */
.error{
    color:#ff0055;
    font-size:12px;
    margin-top:5px;
    display:none;
}

/* ================= MOBILE ================= */
@media(max-width:480px){
    body{
        padding:70px 15px;
    }

    .auth-card{
        padding:30px;
        border-radius:18px;
    }
}

</style>
</head>

<body>

<!-- PRELOADER -->
<div id="preloader">
    <img src="assets/images/logo/stackly_logo.webp" class="loader-logo">
</div>

<!-- THEME TOGGLE -->
<div class="theme-toggle" onclick="toggleMode()" id="themeToggle">🌙</div>

<div class="auth-card">

<div class="auth-logo">
    <a href="index.html">
        <img src="assets/images/logo/stackly_logo.webp" alt="Stackly Logo">
    </a>
</div>

<h2>Login to Stackly</h2>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
<p id="emailError" class="error">Invalid email format</p>
</div>

<div class="input-group">
<label>Password</label>
<div class="password-wrapper">
<input type="password" id="password">
<span id="togglePass">👁</span>
</div>
<p id="passError" class="error">
8+ chars with upper, lower, number & special char
</p>
</div>

<div class="forgot-pass-wrapper">
<a href="404.html" class="forgot-pass-link">Forgot Password?</a>
</div>

<button type="submit" class="btn-primary">Login</button>

<div class="auth-link">
Don't have an account?
<a href="register.html">Register</a>
</div>

</form>
</div>

<script>

function toggleMode(){
    const body=document.body;
    const toggle=document.getElementById("themeToggle");
    body.classList.toggle("dark");
    toggle.innerHTML = body.classList.contains("dark") ? "☀" : "🌙";
}

window.addEventListener("load",function(){
    setTimeout(function(){
        document.getElementById("preloader").style.display="none";
    },1500);
});

const emailError=document.getElementById("emailError");
const passError=document.getElementById("passError");
const email=document.getElementById("email");
const password=document.getElementById("password");

document.getElementById("togglePass").onclick=()=>{
password.type=password.type==="password"?"text":"password";
};

const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const passPattern=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

document.getElementById("loginForm").addEventListener("submit",(e)=>{
e.preventDefault();
let valid=true;

if(!emailPattern.test(email.value)){
emailError.style.display="block";
valid=false;
}else emailError.style.display="none";

if(!passPattern.test(password.value)){
passError.style.display="block";
valid=false;
}else passError.style.display="none";

if(valid){
window.location.href="404.html";
}
});

</script>

</body>
</html>
