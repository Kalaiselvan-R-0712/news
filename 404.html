<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT VARIABLES ================= */
:root{
    --primary:#ff0055;
    --dark:#000000;
    --light:#ffffff;
    --gray:#777777;
}

body.dark{
    --light:#111111;
    --dark:#ffffff;
    --gray:#aaaaaa;
}

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    transition:0.3s ease;
}

body{
    min-height:100dvh;
    padding:60px 20px;
    overflow-x:hidden;
    overflow-y:auto;

    background: linear-gradient(
        135deg,
        #f5f5f5 0%,
        #ffffff 50%,
        #f2f2f2 100%
    );
    display:flex;
    justify-content:center;
    align-items:center;
}

body.dark{
    background: linear-gradient(
        135deg,
        #0f0f0f 0%,
        #141414 50%,
        #0c0c0c 100%
    );
}

/* ================= THEME TOGGLE ================= */
.theme-toggle{
    position:fixed;
    top:20px;
    right:25px;
    background:var(--primary);
    color:#fff;
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:2000;
    font-size:18px;
}

/* ================= ERROR CARD ================= */
.error-card{
    background:var(--light);
    padding:60px 40px;
    max-width:500px;
    width:100%;
    border-radius:20px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.1);
}

body.dark .error-card{
    background:#111111;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
}

/* 404 Number */
.error-card h1{
    font-size:6rem;
    font-weight:700;
    color:var(--primary);
    margin-bottom:10px;
}

/* Subtitle */
.error-card h2{
    font-size:1.5rem;
    margin-bottom:20px;
    color:var(--dark);
}

/* Paragraph */
.error-card p{
    color:var(--gray);
    margin-bottom:30px;
    font-size:1rem;
}

/* Button */
.btn-home{
    display:inline-block;
    background:var(--primary);
    color:#fff;
    padding:14px 30px;
    border-radius:30px;
    text-decoration:none;
    font-weight:600;
}

.btn-home:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,0,85,0.3);
}

/* ================= MOBILE ================= */
@media(max-width:480px){
    body{
        padding:70px 15px;
    }

    .error-card{
        padding:40px 25px;
        border-radius:18px;
    }

    .error-card h1{
        font-size:4.5rem;
    }
}

</style>
</head>

<body>

<!-- THEME TOGGLE -->
<div class="theme-toggle" onclick="toggleMode()" id="themeToggle">🌙</div>

<div class="error-card">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>
        The page you’re looking for doesn’t exist or may have been moved.
        Let’s get you back to safety.
    </p>
    <a href="index.html" class="btn-home">⬅ Back to Home</a>
</div>

<script>
function toggleMode(){
    const body=document.body;
    const toggle=document.getElementById("themeToggle");
    body.classList.toggle("dark");
    toggle.innerHTML = body.classList.contains("dark") ? "☀" : "🌙";
}
</script>

</body>
</html>
